<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实用资料库 - 专业资源下载平台</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/main.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
    <!-- 粒子背景 -->
    <div id="particles-js"></div>
    <div id="particles-content" class="particles-layer"></div>
    <div id="particles-foreground" class="particles-layer"></div>
    
    <!-- 顶部导航 -->
    <header class="top-header">
        <div class="header-content">
            <!-- 左侧Logo和标题 -->
            <div class="header-left">
                <h1>实用资料库</h1>
            </div>
            
            <!-- 右侧导航菜单 -->
            <nav class="header-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="#" class="nav-link">首页</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">分类</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">关于</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">联系我们</a>
                    </li>
                </ul>
            </nav>
            
            <!-- 移动端菜单按钮 -->
            <button class="mobile-menu-btn">
                <span class="menu-icon"></span>
                <span class="menu-icon"></span>
                <span class="menu-icon"></span>
            </button>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧分类导航 -->
        <aside class="sidebar">
            <nav class="category-nav">
                <ul class="category-list">
                    <!-- 主分类将通过JavaScript动态加载 -->
                </ul>
            </nav>
        </aside>

        <!-- 右侧内容区域 -->
        <main class="content">
            <!-- 搜索栏 -->
            <div class="search-section">
                <div class="search-container">
                    <input type="text" placeholder="搜索资源名称或描述..." class="search-input">
                    <button class="search-btn">🔍</button>
                </div>
            </div>

            <!-- 筛选栏 -->
            <div class="filter-section">
                <div class="filter-container">
                    <select class="filter-select">
                        <option value="all">全部类别</option>
                        <!-- 子分类将通过JavaScript动态加载 -->
                    </select>
                    <select class="filter-select">
                        <option value="all">全部平台</option>
                        <option value="windows">Windows</option>
                        <option value="macos">macOS</option>
                        <option value="linux">Linux</option>
                        <option value="web">Web</option>
                        <option value="all">All</option>
                    </select>
                    <select class="filter-select">
                        <option value="latest">最新更新</option>
                        <option value="popular">最受欢迎</option>
                        <option value="size-asc">文件最小</option>
                        <option value="size-desc">文件最大</option>
                    </select>
                </div>
            </div>

            <!-- 资源展示区域 -->
            <section class="resources-section">
                <div class="resources-grid" id="resources-container">
                    <!-- 资源卡片将通过JavaScript动态加载 -->
                </div>
            </section>
        </main>
    </div>

    <!-- 资源详情弹窗 -->
    <div class="resource-modal" id="resource-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <div class="modal-body" id="modal-body">
                <!-- 资源详情将通过JavaScript动态加载 -->
            </div>
        </div>
    </div>

    <script src="js/main.min.js"></script>
</body>
</html>
