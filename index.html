<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CodeVault - 全栈开发者资源站，170+开发工具、框架、AI工具聚合" data-seo="description">
  <meta name="keywords" content="开发工具,前端,后端,全栈,资源分享" data-seo="keywords">
  <meta name="author" content="gengxiaoyu" data-seo="author">
  <title data-seo="title">个人资源收藏站 - 网址与资料管理</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- CSS样式 -->
  <link rel="stylesheet" href="css/main.css">
  <!-- 烟花特效样式 -->
  <link rel="stylesheet" href="css/fireworks.css">
  <!-- Font Awesome图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- ========== 导航栏 ========== -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="#home" class="navbar-brand">
        <span class="navbar-brand-icon">📚</span>
        <span data-app="name">老耿资源站</span>
      </a>
      <div class="navbar-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="navbar-nav" data-navigation="container">
        <!-- 动态渲染 -->
      </div>
    </div>
  </nav>

  <!-- ========== 页面内容 ========== -->
  <div class="page-content">
    <!-- 首页 -->
    <div id="home" class="page visible">
      <!-- 烟花特效区域 -->
      <section class="fireworks-section">
        <canvas id="canvas"></canvas>
        
        <!-- 年份显示 -->
        <div class="year-display">
          <span class="year-line1" data-app="year-line1">欢迎使用</span>
          <span class="year-line2" data-app="year-line2">2026</span>
        </div>

        <!-- UI容器 -->
        <div class="ui-container">
          <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle Fullscreen">⛶</button>
          
          <button class="eye-btn" id="toggleUI" title="Toggle UI Visibility">
            <span class="eye-icon">👁</span>
          </button>
          
          <!-- <div class="developer-credit">
            Developed by <a rel="nofollow" href="https://www.tooplate.com" target="_blank">Tooplate</a>
          </div> -->

          <header>
            <h1 data-app="home-title">网址与资料收藏站</h1>
            <p class="subtitle" data-app="home-subtitle">收藏常用网址，分享优质资料，助力个人网站搭建</p>
          </header>

          <div class="instructions">
            <h2>点击任意位置发射烟花</h2>
            <p>请在下面选择您的颜色和图案</p>
          </div>

          <div class="controls">
            <div class="control-group">
              <span class="control-label">颜色</span>
              <div class="color-palette">
                <div class="color-option burgundy active" data-color="#FF5A6E"></div>
                <div class="color-option gold" data-color="#FFD700"></div>
                <div class="color-option emerald" data-color="#3FE0A0"></div>
                <div class="color-option purple" data-color="#B377FF"></div>
                <div class="color-option champagne" data-color="#FFFEF7"></div>
              </div>
            </div>

            <div class="control-group">
              <span class="control-label">模式</span>
              <div class="firework-types">
                <button class="type-btn active" data-type="burst">爆发</button>
                <button class="type-btn" data-type="ring">环型</button>
                <button class="type-btn" data-type="willow">柳树</button>
                <button class="type-btn" data-type="spiral">螺旋</button>
              </div>
            </div>

            <div class="control-group">
              <span class="control-label">操作</span>
              <div class="action-buttons">
                <button class="action-btn" id="autoShow">
                  <span class="play-icon">▶</span>
                  <span class="stop-icon">⏹</span>
                  <span class="button-text">自动播放</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- 资源库页面 -->
    <div id="resources" class="page hidden">
      <section class="resources">
        <div class="resources-container">
          <div class="resources-layout">
            <!-- 左侧边栏 -->
            <aside class="sidebar">
              <div class="sidebar-content">
                <!-- 分类导航 -->
                <div class="category-nav">
                  <!-- 动态渲染 -->
                </div>

                <!-- 子分类导航 -->
                <div class="subcategory-nav">
                  <!-- 动态渲染 -->
                </div>
              </div>
            </aside>

            <!-- 主内容区 -->
            <main class="main-content">
              <h1 class="section-title">资源库</h1>
              <p class="section-subtitle" data-resources="subtitle">170+精选开发工具、框架与AI工具</p>

              <!-- 搜索栏 -->
              <div class="search-bar">
                <input type="text" class="search-input" placeholder="搜索资源名称或描述...">
              </div>

              <!-- 子分类导航容器 -->
              <div class="card-subcategory-nav"></div>

              <!-- 分类资源区 -->
              <div class="modular-section category-resources-section">
                <div class="resources-grid">
                  <!-- 动态渲染 -->
                </div>
              </div>
            </main>
          </div>
        </div>
      </section>
    </div>

    <!-- 关于页面 -->
    <div id="about" class="page hidden">
      <section class="about">
        <div class="about-container">
          <h1 class="section-title">关于我</h1>
          <p class="section-subtitle" data-profile="subtitle">全栈开发者 | 开源贡献者 | 技术博主</p>

          <!-- 个人资料卡片 -->
          <div class="profile-header">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=gengxiaoyu" alt="头像" class="profile-avatar">
            <div class="profile-info">
              <h2 class="profile-name">gengxiaoyu</h2>
              <p class="profile-title">Full-Stack Developer</p>
              <p class="profile-bio">热衷于开源和知识分享，专注于前端技术和全栈开发。拥有多年项目经验，热爱探索新技术，致力于通过技术创造价值。</p>
              <div class="profile-meta">
                <div class="profile-meta-item">
                  <i class="fas fa-map-marker-alt"></i>
                  <span data-contact="location">China</span>
                </div>
                <div class="profile-meta-item">
                  <i class="fas fa-envelope"></i>
                  <span data-contact="email">gengxiaoyu@example.com</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 技能展示 -->
          <div class="skills-section">
            <h2 class="skills-section-title">技能专长</h2>
            <div class="skills-grid">
              <!-- 动态渲染 -->
            </div>
          </div>

          <!-- 联系方式 -->
          <div class="contact-section">
            <h2 class="contact-section-title">联系方式</h2>
            <div class="contact-links">
              <!-- 动态渲染 -->
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <!-- JavaScript模块 -->
  <script type="module" src="js/main.js"></script>
  <!-- 烟花特效脚本 -->
  <script src="js/modules/fireworks.js"></script>
</body>
</html>
