<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炫酷工具箱 - 专业工具下载平台</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/main.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
    <!-- 粒子背景 -->
    <div id="particles-js"></div>
    <div id="particles-content" class="particles-layer"></div>
    <div id="particles-foreground" class="particles-layer"></div>
    
    <!-- 顶部导航 -->
    <header class="top-header">
        <div class="header-content">
            <!-- 左侧Logo和标题 -->
            <div class="header-left">
                <h1>工具箱</h1>
            </div>
            
            <!-- 右侧导航菜单 -->
            <nav class="header-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="#" class="nav-link">首页</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">分类</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">关于</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">联系我们</a>
                    </li>
                </ul>
            </nav>
            
            <!-- 移动端菜单按钮 -->
            <button class="mobile-menu-btn">
                <span class="menu-icon"></span>
                <span class="menu-icon"></span>
                <span class="menu-icon"></span>
            </button>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧分类导航 -->
        <aside class="sidebar">
            <nav class="category-nav">
                <ul class="category-list">
                    <li class="category-item active" data-category="all">
                        <span class="category-icon">📱</span>
                        <span class="category-name">全部工具</span>
                    </li>
                    <li class="category-item" data-category="utility">
                        <span class="category-icon">🛠️</span>
                        <span class="category-name">实用软件</span>
                    </li>
                    <li class="category-item" data-category="system">
                        <span class="category-icon">⚙️</span>
                        <span class="category-name">系统工具</span>
                    </li>
                    <li class="category-item" data-category="development">
                        <span class="category-icon">💻</span>
                        <span class="category-name">开发工具</span>
                    </li>
                    <li class="category-item" data-category="gaming">
                        <span class="category-icon">🎮</span>
                        <span class="category-name">游戏工具</span>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 右侧内容区域 -->
        <main class="content">
            <!-- 搜索栏 -->
            <div class="search-section">
                <div class="search-container">
                    <input type="text" placeholder="搜索工具名称或描述..." class="search-input">
                    <button class="search-btn">🔍</button>
                </div>
            </div>

            <!-- 工具展示区域 -->
            <section class="tools-section">
                <div class="tools-grid" id="tools-container">
                    <!-- 工具卡片将通过JavaScript动态加载 -->
                </div>
            </section>
        </main>
    </div>

    <script src="js/main.min.js"></script>
</body>
</html>
